seed: 42
device: cuda
#n
system:
  num_workers: 4
  pin_memory: true
  mixed_precision: true
  deterministic: false
  cudnn_benchmark: true

image:
  source_format: dicom
  input_format: png
  height: 512
  width: 512
  channels: 1
  grayscale_source: true
  replicate_gray_to_rgb: false
  dtype: float32
  normalize:
    enabled: true
    mode: minmax_0_1

dataset:
  name: rsna_pneumonia
  task: binary_classification
  split_level: patient
  num_classes: 2
  class_names:
    - normal_or_no_lung_opacity
    - lung_opacity

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true
  random_state: 42
  group_by: id

labels:
  patient_id_col: id
  target_col: Target
  class_col: class
  bbox_cols: [x, y, width, height]

dicom_conversion:
  enabled: true
  output_size: 512
  save_format: png
  apply_voi_lut: true
  fix_monochrome: true
  clip_percentiles: [1.0, 99.0]
  normalize_to_uint8: true

preprocess:
  resize:
    enabled: true
    size: [512, 512]
    interpolation: area

  clahe:
    enabled: false
    clip_limit: 2.0
    tile_grid_size: [8, 8]

  denoise:
    enabled: false
    method: median
    kernel_size: 3

  save_uint8_png: true

condition:
  enabled: true
  features:
    - qc_score
    - lung_area_ratio
    - asymmetry_index
    - roi_confidence
    - burden_score
    - mean_intensity
    - entropy
  dim: 7
  fill_missing: 0.0
  normalize_features: true
  scaler: standard

training_defaults:
  batch_size: 16
  epochs: 30
  grad_accum_steps: 1
  clip_grad_norm: 1.0

logging:
  print_freq: 20
  save_every_epoch: true
  save_best_only: true