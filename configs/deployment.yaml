service:
  name: pneumo_demo
  mode: api
  host: 0.0.0.0
  port: 8000
  debug: false
#n
runtime:
  device: cuda
  mixed_precision: true
  num_workers: 2

input:
  image_size: [512, 512]
  channels: 3
  normalize: true
  replicate_gray_to_rgb: true
  accept_formats:
    - png
    - jpg
    - jpeg
    - dicom

model:
  task: classification
  checkpoint_path: artifacts/checkpoints/conditional_classifier/best.pth
  use_condition: true
  use_segmentation_guidance: false
  return_logits: false

inference:
  batch_size: 1
  threshold: 0.5
  save_inputs: true
  save_outputs: true

uncertainty:
  enabled: true
  method: mc_dropout
  num_samples: 8
  return_predictive_mean: true
  return_predictive_std: true
  alert_threshold: 0.20

quality_control:
  enabled: true
  qc_reject_threshold: 0.30
  return_qc_flags: true

explainability:
  enable_gradcam: true
  target_layer: layer4
  save_heatmap: true
  save_overlay: true
  overlay_alpha: 0.35
  colormap: jet

api:
  return_probabilities: true
  return_predicted_label: true
  return_uncertainty: true
  return_condition_features: true
  return_explanations: true
  return_qc_flags: true

outputs:
  save_predictions_json: true
  save_overlay_png: true
  save_heatmap_png: true
  save_uncertainty_json: true
  output_dir: artifacts/demo/outputs

  labels:
  0: normal_or_no_lung_opacity
  1: lung_opacity